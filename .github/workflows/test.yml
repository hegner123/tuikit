name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: '0.15.2'

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            zig_os: macos
          - os: ubuntu-latest
            zig_os: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then ARCH="aarch64"; fi
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ARCH}-${{ matrix.zig_os }}-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-${ARCH}-${{ matrix.zig_os }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
