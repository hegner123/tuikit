name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: '0.15.2'

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            zig_os: macos
            arch: aarch64
          - os: macos-13
            zig_os: macos
            arch: x86_64
          - os: ubuntu-latest
            zig_os: linux
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${{ matrix.arch }}-${{ matrix.zig_os }}-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-${{ matrix.arch }}-${{ matrix.zig_os }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Fetch dependencies
        run: |
          for i in 1 2 3; do
            zig build --fetch && break
            echo "Fetch attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
