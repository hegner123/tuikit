name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.15.2'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Fetch dependencies
        run: |
          for i in 1 2 3; do
            zig build --fetch && break
            echo "Fetch attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Build all targets
        run: |
          mkdir -p dist

          zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe
          tar -czf "dist/tuikit-${GITHUB_REF_NAME}-macos-aarch64.tar.gz" -C zig-out/bin tuikit

          zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe
          tar -czf "dist/tuikit-${GITHUB_REF_NAME}-macos-x86_64.tar.gz" -C zig-out/bin tuikit

          zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe
          tar -czf "dist/tuikit-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C zig-out/bin tuikit

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
