name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.15.2'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            zig_os: macos
            arch: aarch64
            artifact: macos-aarch64
          - os: ubuntu-latest
            zig_os: linux
            arch: x86_64
            artifact: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${{ matrix.arch }}-${{ matrix.zig_os }}-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-${{ matrix.arch }}-${{ matrix.zig_os }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Fetch dependencies
        run: |
          for i in 1 2 3; do
            zig build --fetch && break
            echo "Fetch attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Package
        run: tar -czf "tuikit-${{ matrix.artifact }}.tar.gz" -C zig-out/bin tuikit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuikit-${{ matrix.artifact }}
          path: tuikit-${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        run: |
          for f in dist/*.tar.gz; do
            mv "$f" "dist/tuikit-${GITHUB_REF_NAME}-${f#dist/tuikit-}"
          done
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
